# SPDX-License-Identifier: MIT
---
- name: Configure auditd with custom log retention and a file watch rule
  hosts: all
  vars:
    auditd_num_logs: 5
    auditd_max_log_file: 16
    auditd_flush: incremental_async
    auditd_freq: 50
    auditd_rules:
      - file: /etc/passwd
        permissions:
          - read
          - write
          - attribute_change
        keyname: passwd_watch
  roles:
    - linux-system-roles.auditd
